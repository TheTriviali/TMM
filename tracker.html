<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMM Tracker</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22222f;
    --border: #2e2e3e;
    --accent: #7c6af7;
    --accent-dim: #4a428f;
    --text: #e0e0f0;
    --text-dim: #888899;
    --text-dimmer: #555566;
    --green: #4caf7d;
    --yellow: #e8c547;
    --red: #e05c5c;
    --blue: #5c9ee0;
    --check-c: #7c6af7;
    --check-n: #4caf7d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Header ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-title { font-size: 15px; font-weight: 700; letter-spacing: .03em; white-space: nowrap; }
  .header-title span { color: var(--accent); }

  .stats { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim); cursor: pointer; font-size: 12px;
    transition: all .15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--text); }

  .header-actions { margin-left: auto; display: flex; gap: 8px; }
  .btn {
    padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); cursor: pointer; font-size: 12px;
    transition: all .15s;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent-dim); border-color: var(--accent); }
  .btn.primary:hover { background: var(--accent); }

  /* ── Main layout ── */
  main { max-width: 960px; margin: 0 auto; padding: 24px 20px 60px; }

  /* ── Section ── */
  .section { margin-bottom: 32px; }
  .section-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px; cursor: pointer; user-select: none;
  }
  .section-header h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); }
  .section-count {
    font-size: 11px; padding: 1px 7px; border-radius: 10px;
    background: var(--surface2); color: var(--text-dimmer); border: 1px solid var(--border);
  }
  .section-toggle { margin-left: auto; font-size: 11px; color: var(--text-dimmer); }
  .section-body { display: flex; flex-direction: column; gap: 1px; }

  /* ── Item card ── */
  .item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 10px;
    align-items: start;
    transition: border-color .15s;
  }
  .item:hover { border-color: var(--border); }
  .item.done-both { opacity: 0.45; }
  .item.hidden { display: none; }

  /* status dot */
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0;
  }
  .status-open    { background: var(--blue); }
  .status-partial { background: var(--yellow); }
  .status-blocked { background: var(--red); }

  /* content */
  .item-content { min-width: 0; }
  .item-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .item-detail {
    font-size: 12px; color: var(--text-dim); margin-top: 4px;
    display: none;
    line-height: 1.6;
  }
  .item-detail.visible { display: block; }
  .item-toggle-detail {
    font-size: 11px; color: var(--text-dimmer); cursor: pointer; margin-top: 3px;
    display: inline-block;
  }
  .item-toggle-detail:hover { color: var(--accent); }

  /* notes */
  .item-notes {
    margin-top: 8px; width: 100%;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-size: 12px;
    padding: 5px 8px; resize: vertical; min-height: 28px;
    font-family: inherit;
  }
  .item-notes:focus { outline: none; border-color: var(--accent-dim); }
  .item-notes::placeholder { color: var(--text-dimmer); }

  /* checkboxes */
  .item-checks {
    display: flex; flex-direction: column; gap: 8px; align-items: center; flex-shrink: 0;
    padding-top: 2px;
  }
  .check-label {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer;
  }
  .check-label span {
    font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
  }
  .check-c span { color: var(--check-c); }
  .check-n span { color: var(--check-n); }

  .custom-check {
    width: 22px; height: 22px; border-radius: 5px;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
    background: var(--surface2);
  }
  .check-c .custom-check { border-color: var(--accent-dim); }
  .check-n .custom-check { border-color: #2e5c3e; }

  input[type=checkbox] { display: none; }
  input[type=checkbox]:checked + .custom-check {
    background: var(--check-c);
    border-color: var(--check-c);
  }
  .check-n input[type=checkbox]:checked + .custom-check {
    background: var(--check-n);
    border-color: var(--check-n);
  }
  .custom-check::after {
    content: ''; display: none;
    width: 5px; height: 9px;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(45deg) translate(-1px, -1px);
  }
  input[type=checkbox]:checked + .custom-check::after { display: block; }

  /* legend */
  .legend {
    display: flex; gap: 14px; align-items: center;
    font-size: 11px; color: var(--text-dimmer);
    padding: 6px 0 0;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; }
</style>
</head>
<body>

<header>
  <div class="header-title">TMM <span>Tracker</span></div>
  <div class="stats" id="stats-bar">Loading…</div>
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="open">Open</button>
    <button class="filter-btn" data-filter="claude-done">Claude done</button>
    <button class="filter-btn" data-filter="noah-verified">Noah verified</button>
    <button class="filter-btn" data-filter="complete">Complete</button>
  </div>
  <div class="header-actions">
    <button class="btn" id="btn-import" title="Import state from a previously exported JSON">Import</button>
    <button class="btn primary" id="btn-save" title="Save current state back to tracker.json">Save JSON</button>
  </div>
</header>

<main id="app">
  <div style="color:var(--text-dim);padding:40px 0;text-align:center">Loading tracker.json…</div>
</main>

<input type="file" id="file-input" accept=".json" style="display:none">

<script>
// ── Data ─────────────────────────────────────────────────────────────────────

let trackerData = null;
const STORAGE_KEY = 'tmm-tracker-state';

// Load tracker.json via fetch (works when served), or fallback to manual file selection
async function loadData() {
  try {
    const resp = await fetch('tracker.json');
    if (!resp.ok) throw new Error('Network response was not ok');
    trackerData = await resp.json();
    overlayState();
    render();
    updateStats();
  } catch {
    // fetch failed (file:// protocol without server) — try inline fallback
    trackerData = window.__TRACKER_FALLBACK__ ?? null;
    if (!trackerData) {
      document.getElementById('app').innerHTML =
        `<div style="color:var(--red);padding:40px;text-align:center;line-height:1.6">
          Could not automatically load <b>tracker.json</b>.<br>
          <small style="color:var(--text-dim)">Browsers block automatic local file loading for security. To fix this, select your tracker.json file manually:</small><br><br>
          <button class="btn primary" id="btn-manual-load">Select tracker.json</button>
          <input type="file" id="manual-file-input" accept=".json" style="display:none">
        </div>`;
      
      document.getElementById('btn-manual-load').addEventListener('click', () => {
        document.getElementById('manual-file-input').click();
      });

      document.getElementById('manual-file-input').addEventListener('change', async e => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          trackerData = JSON.parse(text);
          overlayState();
          render();
          updateStats();
        } catch (err) {
          alert("Error parsing JSON file. Please make sure you selected a valid tracker.json file.");
        }
      });
      return;
    } else {
      overlayState();
      render();
      updateStats();
    }
  }
}

// Merge saved state (checkboxes, notes) on top of the JSON data
function overlayState() {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  for (const section of trackerData.sections) {
    for (const item of section.items) {
      if (saved[item.id]) {
        item.claudeDone    = saved[item.id].claudeDone    ?? item.claudeDone;
        item.noahVerified  = saved[item.id].noahVerified  ?? item.noahVerified;
        item.notes         = saved[item.id].notes         ?? item.notes;
      }
    }
  }
}

// ── Render ────────────────────────────────────────────────────────────────────

let currentFilter = 'all';

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  // Legend
  const leg = document.createElement('div');
  leg.className = 'legend';
  leg.innerHTML = `
    <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div> Open</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div> Partial</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> Blocked</div>
  `;
  app.appendChild(leg);

  for (const section of trackerData.sections) {
    const visibleItems = section.items.filter(i => itemVisible(i));
    if (visibleItems.length === 0) continue;

    const sec = document.createElement('div');
    sec.className = 'section';
    sec.dataset.sectionId = section.id;

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = `
      <h2>${section.title}</h2>
      <span class="section-count">${visibleItems.length}</span>
      <span class="section-toggle">▾</span>
    `;
    sec.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'section-body';
    body.id = `section-body-${section.id}`;

    for (const item of section.items) {
      body.appendChild(renderItem(item));
    }

    sec.appendChild(body);
    app.appendChild(sec);

    // Collapsible section
    hdr.addEventListener('click', () => {
      const isHidden = body.style.display === 'none';
      body.style.display = isHidden ? '' : 'none';
      hdr.querySelector('.section-toggle').textContent = isHidden ? '▾' : '▸';
    });
  }

  applyFilter(currentFilter);
}

function renderItem(item) {
  const card = document.createElement('div');
  card.className = 'item' + (item.claudeDone && item.noahVerified ? ' done-both' : '');
  card.dataset.itemId = item.id;
  card.dataset.claudeDone   = item.claudeDone;
  card.dataset.noahVerified = item.noahVerified;

  const dotClass = item.status === 'partial' ? 'status-partial'
                 : item.status === 'blocked' ? 'status-blocked'
                 : 'status-open';

  card.innerHTML = `
    <div class="status-dot ${dotClass}" title="${item.status}"></div>
    <div class="item-content">
      <div class="item-title">${item.title}</div>
      ${item.detail ? `<span class="item-toggle-detail" title="Toggle detail">show detail ▾</span>
      <div class="item-detail">${escHtml(item.detail)}</div>` : ''}
      <textarea class="item-notes" placeholder="Notes…" rows="1">${escHtml(item.notes)}</textarea>
    </div>
    <div class="item-checks">
      <label class="check-label check-c" title="Claude done">
        <span>C</span>
        <input type="checkbox" ${item.claudeDone ? 'checked' : ''}>
        <div class="custom-check"></div>
      </label>
      <label class="check-label check-n" title="Noah verified">
        <span>N</span>
        <input type="checkbox" ${item.noahVerified ? 'checked' : ''}>
        <div class="custom-check"></div>
      </label>
    </div>
  `;

  // Detail toggle
  const toggle = card.querySelector('.item-toggle-detail');
  const detail = card.querySelector('.item-detail');
  if (toggle && detail) {
    toggle.addEventListener('click', e => {
      e.stopPropagation();
      const vis = detail.classList.toggle('visible');
      toggle.textContent = vis ? 'hide detail ▴' : 'show detail ▾';
    });
  }

  // Checkboxes
  const [checkC, checkN] = card.querySelectorAll('input[type=checkbox]');
  checkC.addEventListener('change', () => {
    item.claudeDone = checkC.checked;
    card.dataset.claudeDone = checkC.checked;
    updateCard(card, item);
    saveState();
    updateStats();
  });
  checkN.addEventListener('change', () => {
    item.noahVerified = checkN.checked;
    card.dataset.noahVerified = checkN.checked;
    updateCard(card, item);
    saveState();
    updateStats();
  });

  // Notes
  const notes = card.querySelector('.item-notes');
  notes.addEventListener('input', () => {
    item.notes = notes.value;
    // Auto-grow
    notes.style.height = 'auto';
    notes.style.height = notes.scrollHeight + 'px';
    saveState();
  });
  // Init height
  setTimeout(() => {
    if (notes.value) {
      notes.style.height = 'auto';
      notes.style.height = notes.scrollHeight + 'px';
    }
  }, 0);

  return card;
}

function updateCard(card, item) {
  if (item.claudeDone && item.noahVerified) {
    card.classList.add('done-both');
  } else {
    card.classList.remove('done-both');
  }
  applyFilterToCard(card, currentFilter);
}

function escHtml(str) {
  return (str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Filter ────────────────────────────────────────────────────────────────────

function itemVisible(item) {
  switch (currentFilter) {
    case 'all':           return true;
    case 'open':          return !item.claudeDone || !item.noahVerified;
    case 'claude-done':   return item.claudeDone;
    case 'noah-verified': return item.noahVerified;
    case 'complete':      return item.claudeDone && item.noahVerified;
    default:              return true;
  }
}

function applyFilterToCard(card, filter) {
  const cd = card.dataset.claudeDone === 'true';
  const nv = card.dataset.noahVerified === 'true';
  let visible = true;
  switch (filter) {
    case 'open':          visible = !cd || !nv; break;
    case 'claude-done':   visible = cd; break;
    case 'noah-verified': visible = nv; break;
    case 'complete':      visible = cd && nv; break;
  }
  card.classList.toggle('hidden', !visible);
}

function applyFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.item').forEach(card => applyFilterToCard(card, filter));
  // Hide empty sections
  document.querySelectorAll('.section').forEach(sec => {
    const visible = [...sec.querySelectorAll('.item')].some(c => !c.classList.contains('hidden'));
    sec.style.display = visible ? '' : 'none';
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilter(btn.dataset.filter);
  });
});

// ── Stats ─────────────────────────────────────────────────────────────────────

function updateStats() {
  if (!trackerData) return;
  let total = 0, cd = 0, nv = 0, done = 0;
  for (const sec of trackerData.sections)
    for (const item of sec.items) {
      total++;
      if (item.claudeDone)   cd++;
      if (item.noahVerified) nv++;
      if (item.claudeDone && item.noahVerified) done++;
    }
  document.getElementById('stats-bar').textContent =
    `${done}/${total} complete · ${cd} Claude done · ${nv} Noah verified`;
}

// ── Persistence ───────────────────────────────────────────────────────────────

function saveState() {
  const state = {};
  for (const sec of trackerData.sections)
    for (const item of sec.items)
      state[item.id] = { claudeDone: item.claudeDone, noahVerified: item.noahVerified, notes: item.notes };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// Save back to tracker.json via File System Access API
document.getElementById('btn-save').addEventListener('click', async () => {
  const updated = JSON.parse(JSON.stringify(trackerData));
  updated.lastUpdated = new Date().toISOString().slice(0, 10);
  const json = JSON.stringify(updated, null, 2);

  if ('showSaveFilePicker' in window) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: 'tracker.json',
        types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
      });
      const writable = await handle.createWritable();
      await writable.write(json);
      await writable.close();
      flashBtn('btn-save', 'Saved ✓');
    } catch (e) {
      if (e.name !== 'AbortError') downloadJson(json);
    }
  } else {
    downloadJson(json);
  }
});

function downloadJson(json) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([json], { type: 'application/json' }));
  a.download = 'tracker.json';
  a.click();
  flashBtn('btn-save', 'Downloaded ✓');
}

function flashBtn(id, text) {
  const btn = document.getElementById(id);
  const orig = btn.textContent;
  btn.textContent = text;
  setTimeout(() => btn.textContent = orig, 2000);
}

// Import state from a previously exported tracker.json
document.getElementById('btn-import').addEventListener('click', () => {
  document.getElementById('file-input').click();
});
document.getElementById('file-input').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  const text = await file.text();
  const imported = JSON.parse(text);
  // Merge state from imported file into live data
  for (const sec of imported.sections ?? [])
    for (const item of sec.items ?? []) {
      for (const liveSec of trackerData.sections)
        for (const liveItem of liveSec.items)
          if (liveItem.id === item.id) {
            liveItem.claudeDone   = item.claudeDone;
            liveItem.noahVerified = item.noahVerified;
            liveItem.notes        = item.notes;
          }
    }
  saveState();
  render();
  updateStats();
  e.target.value = '';
  flashBtn('btn-import', 'Imported ✓');
});

// ── Boot ──────────────────────────────────────────────────────────────────────

loadData();
</script>
</body>
</html>
